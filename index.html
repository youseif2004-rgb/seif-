<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Station Control — 12 Bays</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg: #0b0f14;
    --panel: #121821;
    --panel-edge: #1d2731;
    --ink: #e8edf2;
    --ink-dim: #7c8a99;
    --ps5: #4fd7ff;
    --ps5-dim: #1c3a44;
    --ps4: #b18cff;
    --ps4-dim: #2c2540;
    --live: #ffb347;
    --off: #33414f;
    --mono: 'Courier New', ui-monospace, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height:100vh;
    padding: 28px 20px 60px;
  }
  .top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    max-width:1280px;
    margin:0 auto 26px;
    border-bottom:1px solid var(--panel-edge);
    padding-bottom:18px;
  }
  .brand{
    font-family: var(--mono);
    letter-spacing:2px;
    font-size:13px;
    color: var(--ink-dim);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:'Segoe UI', sans-serif;
    letter-spacing:0.5px;
    font-size:28px;
    color:var(--ink);
    margin-top:4px;
  }
  .ledger{
    display:flex;
    gap:26px;
    font-family:var(--mono);
  }
  .ledger .stat{ text-align:right; }
  .ledger .stat .n{ font-size:24px; font-weight:bold; }
  .ledger .stat .l{ font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:1px; }
  #liveN{ color: var(--live); }
  #revN{ color: #5fe38a; }

  .grid{
    max-width:1280px;
    margin:0 auto;
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:16px;
  }
  @media (max-width: 980px){ .grid{ grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px){ .grid{ grid-template-columns: 1fr; } }

  .card{
    background: var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:10px;
    padding:16px;
    position:relative;
    overflow:hidden;
    transition: border-color .25s ease;
  }
  .card.running{ border-color: var(--accent); }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:3px;
    background: var(--off);
  }
  .card.running::before{ background: var(--accent); }

  .card.ps5{ --accent: var(--ps5); }
  .card.ps4{ --accent: var(--ps4); }

  .row1{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .room{ font-family:var(--mono); font-size:14px; color:var(--ink-dim); letter-spacing:1px; }
  .badge{
    font-size:11px; font-weight:bold; letter-spacing:1px;
    padding:3px 8px; border-radius:20px;
    background: var(--accent-dim, var(--off));
  }
  .card.ps5 .badge{ background: var(--ps5-dim); color: var(--ps5); }
  .card.ps4 .badge{ background: var(--ps4-dim); color: var(--ps4); }

  .timer{
    font-family:var(--mono);
    font-size:34px;
    letter-spacing:1px;
    margin: 6px 0 2px;
    color: var(--ink-dim);
  }
  .card.running .timer{ color: var(--ink); }

  .times{
    font-family: var(--mono);
    font-size:11px;
    color: var(--ink-dim);
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    min-height:14px;
  }

  .mode{
    display:flex;
    background: #0d1319;
    border:1px solid var(--panel-edge);
    border-radius:7px;
    overflow:hidden;
    margin-bottom:10px;
  }
  .mode button{
    flex:1;
    background:none;
    border:none;
    color: var(--ink-dim);
    font-size:12px;
    font-weight:bold;
    padding:8px 0;
    cursor:pointer;
    letter-spacing:0.5px;
  }
  .mode button.sel{
    background: var(--accent-dim, var(--off));
    color: var(--accent, var(--ink));
  }
  .card.ps5 .mode button.sel{ background: var(--ps5-dim); color: var(--ps5); }
  .card.ps4 .mode button.sel{ background: var(--ps4-dim); color: var(--ps4); }
  .mode button:disabled{ opacity:0.5; cursor:not-allowed; }

  .price{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    margin-bottom:12px;
  }

  .cost{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:12px;
  }
  .cost .amt{ font-size:22px; font-weight:bold; font-family:var(--mono); }
  .cost .cur{ font-size:11px; color:var(--ink-dim); }

  .go{
    width:100%;
    padding:11px 0;
    border:none;
    border-radius:7px;
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
    cursor:pointer;
    background: var(--accent);
    color: #0b0f14;
  }
  .card.running .go{
    background: #29323d;
    color: var(--ink);
    border:1px solid #3a4753;
  }
  .go:active{ transform: scale(0.98); }

  footer{
    max-width:1280px;
    margin:30px auto 0;
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    text-align:center;
  }
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    STATION CONTROL
    <h1>12 Bays · 6×PS5 / 6×PS4</h1>
  </div>
  <div class="ledger">
    <div class="stat"><div class="n" id="liveN">0</div><div class="l">Live now</div></div>
    <div class="stat"><div class="n" id="revN">0</div><div class="l">Revenue today (EGP)</div></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer>Tap START to open a session · tap STOP to close it and lock in the price · switching mode mid-session is disabled once running · figures reset if this page is closed</footer>

<script>
const RATES = {
  ps5: { single: 120, multi: 160 },
  ps4: { single: 80,  multi: 120 }
};

const stations = [];
for (let i = 1; i <= 6; i++) stations.push({ id: 'PS5-' + i, console: 'ps5', label: 'Room ' + i });
for (let i = 1; i <= 6; i++) stations.push({ id: 'PS4-' + (i+6), console: 'ps4', label: 'Room ' + (i+6) });

const state = {};
stations.forEach(s => {
  state[s.id] = {
    mode: 'single',
    running: false,
    startTime: null,
    endTime: null,
    accumCost: 0 // finalized revenue from past sessions on this bay today
  };
});

let totalRevenue = 0;

function fmtClock(d){
  return d.toTimeString().slice(0,8);
}
function fmtDuration(ms){
  const s = Math.floor(ms/1000);
  const h = String(Math.floor(s/3600)).padStart(2,'0');
  const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return h+':'+m+':'+sec;
}
function currentCost(st){
  if (!st.startTime) return 0;
  const end = st.running ? new Date() : st.endTime;
  const hours = (end - st.startTime) / 3600000;
  const rate = RATES[st.consoleType][st.mode];
  return hours * rate;
}

const grid = document.getElementById('grid');

stations.forEach(s => {
  const st = state[s.id];
  st.consoleType = s.console;

  const card = document.createElement('div');
  card.className = 'card ' + s.console;
  card.id = 'card-' + s.id;

  card.innerHTML = `
    <div class="row1">
      <div class="room">${s.label}</div>
      <div class="badge">${s.console.toUpperCase()}</div>
    </div>
    <div class="timer" id="timer-${s.id}">00:00:00</div>
    <div class="times">
      <span id="start-${s.id}">start —</span>
      <span id="end-${s.id}">end —</span>
    </div>
    <div class="mode">
      <button id="single-${s.id}" class="sel" onclick="setMode('${s.id}','single')">SINGLE · ${RATES[s.console].single}</button>
      <button id="multi-${s.id}" onclick="setMode('${s.id}','multi')">MULTI · ${RATES[s.console].multi}</button>
    </div>
    <div class="cost">
      <div><span class="amt" id="cost-${s.id}">0</span> <span class="cur">EGP</span></div>
      <div class="cur" id="rate-${s.id}">${RATES[s.console].single}/hr</div>
    </div>
    <button class="go" id="go-${s.id}" onclick="toggle('${s.id}')">START</button>
  `;
  grid.appendChild(card);
});

function setMode(id, mode){
  const st = state[id];
  if (st.running) return;
  st.mode = mode;
  document.getElementById('single-'+id).classList.toggle('sel', mode==='single');
  document.getElementById('multi-'+id).classList.toggle('sel', mode==='multi');
  document.getElementById('rate-'+id).textContent = RATES[st.consoleType][mode] + '/hr';
}

function toggle(id){
  const st = state[id];
  const card = document.getElementById('card-'+id);
  const goBtn = document.getElementById('go-'+id);

  if (!st.running){
    st.running = true;
    st.startTime = new Date();
    st.endTime = null;
    card.classList.add('running');
    goBtn.textContent = 'STOP';
    document.getElementById('start-'+id).textContent = 'start ' + fmtClock(st.startTime);
    document.getElementById('end-'+id).textContent = 'end —';
    document.getElementById('single-'+id).disabled = true;
    document.getElementById('multi-'+id).disabled = true;
  } else {
    st.running = false;
    st.endTime = new Date();
    const finalCost = currentCost(st);
    st.accumCost += finalCost;
    totalRevenue += finalCost;
    card.classList.remove('running');
    goBtn.textContent = 'START';
    document.getElementById('end-'+id).textContent = 'end ' + fmtClock(st.endTime);
    document.getElementById('single-'+id).disabled = false;
    document.getElementById('multi-'+id).disabled = false;
    updateLedger();
  }
}

function updateLedger(){
  let live = 0;
  Object.values(state).forEach(st => { if (st.running) live++; });
  document.getElementById('liveN').textContent = live;
  document.getElementById('revN').textContent = Math.round(totalRevenue).toLocaleString();
}

function tick(){
  let liveCost = 0;
  stations.forEach(s => {
    const st = state[s.id];
    if (st.running){
      const elapsed = new Date() - st.startTime;
      document.getElementById('timer-'+s.id).textContent = fmtDuration(elapsed);
      const c = currentCost(st);
      document.getElementById('cost-'+s.id).textContent = Math.round(c).toLocaleString();
      liveCost += c;
    }
  });
  document.getElementById('revN').textContent = Math.round(totalRevenue + liveCost).toLocaleString();
}
setInterval(tick, 1000);
updateLedger();
</script>

</body>
</html>
